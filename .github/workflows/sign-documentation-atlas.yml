name: 📖 Build Atlas PDF of all signs

concurrency:
  group: atlas-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_call' }}

on:
  pull_request:
    branches:
      - main
    paths:
      - project/signalo.qgs
      - project/images/official/**
      - datamodel/**
      - '.github/workflows/sign-documentation-atlas.yml'
  workflow_dispatch:
  workflow_call: # Allows this workflow to be called by other workflows
    inputs:
      release_tag:
        required: false
        description: 'Release tag to upload the atlas PDF as a GitHub Release asset'
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Atlas PDF of official signs
    runs-on: ubuntu-latest
    env:
      PGSERVICE: pg_signalo
      DB_NAME: signalo
      COMPOSE_PROFILES: qgis
      COMPOSE_PROJECT_NAME: signalo
    steps:
      - uses: actions/checkout@v7

      - name: Setup env
        run: cp .env.example .env

      - name: Initialize container
        run: |
          docker compose up -d --build
          until docker compose exec db pg_isready -U postgres; do
            echo "Waiting for PostgreSQL to be ready..."
            sleep 3
          done
          docker compose exec db createdb -U postgres ${DB_NAME}
          docker compose run pum -vvv -p ${PGSERVICE} -d datamodel install -p SRID 2056

      - name: Build Atlas PDF
        run: |
          docker compose run --rm \
            -e QT_QPA_PLATFORM=offscreen \
            qgis \
            qgis_process run native:atlaslayouttopdf \
              --PROJECT_PATH="/usr/src/project/signalo.qgs" \
              LAYOUT="official sign" \
              OUTPUT="/usr/src/atlas-full.pdf"

      - name: Create condensed layout PDF
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-extra-utils
          pdfjam --nup 4x3 --landscape --outfile official-sign-fr.pdf atlas-full.pdf

      - name: Docker logs
        if: failure()
        run: docker compose logs

      - uses: actions/upload-artifact@v7
        with:
          name: official-sign-fr.pdf
          path: official-sign-fr.pdf
          if-no-files-found: error

      - name: Upload atlas PDF as GitHub Release asset
        if: ${{ inputs.release_tag != '' }}
        run: gh release upload "${{ inputs.release_tag }}" official-sign-fr.pdf --repo "$GITHUB_REPOSITORY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
